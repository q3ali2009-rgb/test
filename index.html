<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuwait AI Platform</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPage" class="page active">
    <h1>🇰🇼 هلا والله 👋</h1>
    <p>سجل دخولك يا بطل 🔐</p>
    <input type="password" id="passwordInput" placeholder="حط الباسورد">
    <button onclick="login()">دخول</button>
</div>

<div id="mainPage" class="page">
    <h2 id="welcomeMsg"></h2>

    <div class="options">
        <div class="card" onclick="showRecorder()">
            🎙️ تسجيل المحاضره
            <p>يلا نسجلها وخلها محفوظة 👌</p>
        </div>

        <div class="card" onclick="showAI()">
            🤖 سوالف مع الـ AI
            <p>فضفض واسأل اللي تبي</p>
        </div>
    </div>

    <button class="homeBtn" onclick="goHome()">القائمة الرئيسية</button>
</div>

<div id="recorderPage" class="page">
    <h2>🎧 تسجيل المحاضره</h2>
    <button onclick="startRecording()">ابدأ التسجيل</button>
    <button onclick="stopRecording()">وقف التسجيل</button>
    <audio id="audioPlayback" controls></audio>
    <button class="homeBtn" onclick="goMain()">القائمة الرئيسية</button>
</div>

<div id="aiPage" class="page">
    <h2>🤖 محادثة AI</h2>
    <div id="chatBox"></div>
    <input type="text" id="userInput" placeholder="اكتب سوالفك هنا">
    <button onclick="sendMessage()">إرسال</button>
    <button class="homeBtn" onclick="goMain()">القائمة الرئيسية</button>
</div>

<script src="script.js"></script>
</body>
</html>
