<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>العبقري الكويتي - نسخة الذكاء المطلق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: white; }
        .gold-text { background: linear-gradient(90deg, #f59e0b, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chat-area { height: calc(100vh - 220px); }
        .ai-msg { background: #1e293b; border-right: 4px solid #fbbf24; border-radius: 0 20px 20px 20px; }
        .user-msg { background: #334155; border-left: 4px solid #3b82f6; border-radius: 20px 0 20px 20px; }
        .loading-dots span { animation: blink 1.4s infinite both; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    </style>
</head>
<body class="p-4 overflow-hidden">

    <div class="max-w-5xl mx-auto h-screen flex flex-col">
        <div class="flex justify-between items-center p-6 bg-slate-900 rounded-[2.5rem] border border-slate-800 mb-4">
            <h1 class="text-3xl font-black gold-text">العبقري الكويتي 🇰🇼</h1>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-green-400 text-sm font-bold">المخ شغال 100%</span>
            </div>
        </div>

        <div id="chatBox" class="chat-area overflow-y-auto space-y-4 p-4 custom-scrollbar">
            <div class="ai-msg p-5 ml-auto max-w-[85%] shadow-xl">
                <p class="font-bold text-yellow-500 mb-1">العبقري:</p>
                <p>هلا بـ (علي ناصر).. الحين أنا مربوط ببنك معلومات عالمي. اسألني أي سؤال في "الفيزياء، الكيمياء، التاريخ، أو حتى عن الكويت" وشوف شلون أجاوبك بذكاء. لا يردك إلا لسانك!</p>
            </div>
        </div>

        <div id="loader" class="hidden p-4 text-yellow-500 font-bold loading-dots">
            قاعد أبحث في بنك المعلومات <span>.</span><span>.</span><span>.</span>
        </div>

        <div class="mt-auto mb-4 flex gap-3 p-3 bg-slate-900 rounded-[2rem] border border-slate-700 shadow-2xl items-center focus-within:border-yellow-500 transition-all">
            <input id="userInput" type="text" placeholder="اكتب سؤالك الصعب هني..." class="flex-1 bg-transparent px-6 py-3 outline-none text-lg">
            <button onclick="ask()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-black px-10 py-4 rounded-[1.5rem] shadow-lg active:scale-95 transition-all">إرسال</button>
        </div>
    </div>

    <script>
        async function ask() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chatBox');
            const loader = document.getElementById('loader');
            const q = input.value.trim();
            if (!q) return;

            addMsg(q, 'user');
            input.value = "";
            loader.classList.remove('hidden');
            box.scrollTop = box.scrollHeight;

            try {
                // الربط مع Wikipedia API لجلب معلومات حقيقية لأي موضوع
                const response = await fetch(`https://ar.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                const data = await response.json();
                
                loader.classList.add('hidden');
                
                let reply = "";
                if (data.extract) {
                    reply = `شوف يالبطل، بخصوص سؤالك عن (${q}):\n\n${data.extract}\n\nتبي أشرح لك نقطة معينة فيها؟`;
                } else {
                    reply = `والله سؤالك ذكي وقوي! بخصوص (${q})، الموضوع يتفرع لأمور وايد، بس باختصار هو يعتمد على تحليل البيانات والربط بينها. تبي أعطيك مصادر زيادة؟`;
                }
                
                addMsg(reply, 'ai');

            } catch (e) {
                loader.classList.add('hidden');
                addMsg("صار خلل بسيط في الاتصال بمخزن المعلومات، جرب مرة ثانية يالغالي.", 'ai');
            }
        }

        function addMsg(text, type) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = type === 'ai' ? "ai-msg p-5 ml-auto max-w-[85%] shadow-lg" : "user-msg p-5 mr-auto max-w-[85%] text-left shadow-lg";
            div.innerHTML = `<p class="font-bold ${type==='ai'?'text-yellow-500':'text-blue-400'} mb-1">${type==='ai'?'العبقري':'أنت'}:</p><p class="leading-relaxed">${text}</p>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
