<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Scholar - النسخة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: white; }
        .kashka-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; transition: 0.3s; }
        .kashka-card:hover { border-color: #fbbf24; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(251, 191, 36, 0.2); }
        .gold-text { background: linear-gradient(90deg, #f59e0b, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .dots span { animation: blink 1s infinite; opacity: 0; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden">

    <div id="loginSection" class="z-50 text-center p-12 bg-[#0f172a] rounded-[3rem] border border-slate-800 shadow-2xl w-[450px]">
        <div class="text-6xl mb-6">🇰🇼</div>
        <h1 class="text-3xl font-black mb-2 gold-text">هلا بالزين!</h1>
        <p class="text-slate-400 mb-8 font-medium">سجل الباسورد عشان تبطل الديوانية</p>
        <input id="pw" type="password" placeholder="كلمة السر يالحبيب..." class="w-full bg-[#020617] border border-slate-700 rounded-2xl p-4 mb-4 text-center outline-none focus:border-yellow-500 text-white transition-all">
        <button onclick="checkAccess()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95">دخول</button>
    </div>

    <div id="mainApp" class="hidden fixed inset-0 flex flex-col p-6 h-full w-full">
        <button onclick="goHome()" class="fixed right-6 top-6 z-50 bg-slate-900 p-3 rounded-2xl border border-yellow-500/30 text-yellow-500 hover:bg-yellow-500 hover:text-black transition-all font-bold">🏠 القائمة</button>

        <div id="menuSection" class="flex-1 flex flex-col items-center justify-center space-y-12">
            <h2 class="text-5xl font-black gold-text tracking-tight text-center">آمر تدلل.. شنو بخاطرك؟</h2>
            <div class="flex gap-10">
                <div onclick="showView('recordView')" class="kashka-card p-10 rounded-[3rem] w-80 cursor-pointer text-center group">
                    <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">🎤</div>
                    <h3 class="text-2xl font-black text-white">تسجيل الأستاذ</h3>
                </div>
                <div onclick="showView('chatView')" class="kashka-card p-10 rounded-[3rem] w-80 cursor-pointer text-center group">
                    <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">💬</div>
                    <h3 class="text-2xl font-black text-white">أسأل AI</h3>
                </div>
            </div>
        </div>

        <div id="chatView" class="hidden flex-1 flex flex-col space-y-4 pt-16 max-w-5xl mx-auto w-full">
            <div id="chatContainer" class="flex-1 bg-slate-900/50 rounded-[3rem] p-8 overflow-y-auto flex flex-col space-y-4 custom-scrollbar text-right border border-slate-800 shadow-2xl">
                <div class="bg-yellow-500/10 p-5 rounded-3xl border border-yellow-500/20 text-yellow-200 ml-auto max-w-[85%] font-bold">
                    هلا يالحبيب! أنا الحين صرت أذكى وأفهمك بسرعة. اسألني أي شي عن الدراسة أو الكواكب أو حتى عن الكويت!
                </div>
            </div>
            <div class="flex gap-3 p-4 bg-slate-900/80 rounded-[2rem] border border-slate-800 items-center shadow-xl">
                <label class="cursor-pointer hover:scale-110 transition p-2">
                    🖼️ <input type="file" class="hidden" accept="image/*" onchange="handleImage(this)">
                </label>
                <input id="chatInput" type="text" placeholder="اسألني أي شي.. مثلاً كم عدد الكواكب؟" class="flex-1 bg-transparent border-none outline-none text-white text-right text-lg">
                <button onclick="sendMessage()" class="bg-yellow-500 px-10 py-4 rounded-2xl font-black text-black hover:bg-yellow-400 transition-all shadow-lg">إرسال</button>
            </div>
        </div>

        <div id="recordView" class="hidden flex-1 flex flex-col space-y-4 pt-16">
            <div class="flex justify-between items-center bg-slate-900/80 p-6 rounded-3xl border border-slate-800 shadow-xl text-right">
                <div class="w-full">
                    <h3 class="text-xl font-bold gold-text">تسجيل المحاضرة 🎙️</h3>
                    <p id="status" class="text-sm text-slate-400">قواك الله.. الميكروفون ناطرك</p>
                </div>
                <button id="micBtn" class="bg-yellow-500 px-10 py-3 rounded-full font-black text-black shadow-lg">بدء التسجيل</button>
            </div>
            <div id="transcriptBox" class="flex-1 bg-slate-900/40 rounded-[2.5rem] p-10 border border-slate-800 overflow-y-auto custom-scrollbar text-right">
                <p id="transcript" class="text-2xl leading-relaxed text-slate-200 italic opacity-50">هني راح يطلع الكلام..</p>
            </div>
        </div>
    </div>

    <script>
        const MY_PASS = "alinasser"; //
        
        // قاعدة بيانات معرفية مصغرة للرد السريع
        const knowledgeBase = {
            "كواكب": "عدد كواكب المجموعة الشمسية 8 كواكب وهي: عطارد، الزهرة، الأرض، المريخ، المشتري، زحل، أورانوس، ونبتون. يا بعد راسي تبي شرح عن واحد منهم؟",
            "الكواكب": "عددهم 8 يا بطل! رتبهم من الأقرب للشمس: عطارد والزهرة وإحنا بالأرض وبعدنا المريخ والعمالقة الغازية.",
            "الكويت": "ديرتنا الغالية! تأسست بجهود أهلها الطيبين وعاصمتها مدينة الكويت. تبي معلومات عن تاريخها أو معالمها؟",
            "دراسة": "الدراسة تبي لها مجابل وتركيز، وأنا هني عشان أسهل عليك المهمة. شنو المادة اللي تبي نلخصها؟",
            "من انت": "أنا مساعدك الذكي في ديوانية علي ناصر، مبرمج عشان أخدمك بلهجتنا الكويتية وأحلل لك محاضراتك."
        };

        function checkAccess() {
            if(document.getElementById('pw').value === MY_PASS) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
            }
        }

        function showView(viewId) {
            document.getElementById('menuSection').classList.add('hidden');
            document.getElementById('recordView').classList.add('hidden');
            document.getElementById('chatView').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        }

        function goHome() {
            document.getElementById('menuSection').classList.remove('hidden');
            document.getElementById('recordView').classList.add('hidden');
            document.getElementById('chatView').classList.add('hidden');
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const container = document.getElementById('chatContainer');
            const q = input.value.trim();
            if (q === "") return;

            addMessage(q, 'user');
            input.value = "";

            // تأثير الكتابة
            const typingMsg = document.createElement('div');
            typingMsg.className = "bg-yellow-500/5 p-4 rounded-3xl ml-auto self-end text-yellow-500 font-black dots";
            typingMsg.innerHTML = "قاعد أحلل سؤالك <span>•</span><span>•</span><span>•</span><span>•</span>";
            container.appendChild(typingMsg);
            container.scrollTop = container.scrollHeight;

            // محرك الإجابة الذكي
            setTimeout(() => {
                typingMsg.remove();
                let answer = "يا بعد راسي والله سؤالك ممتاز! بس يبي لي أبحث فيه أكثر.. تبي أعطيك معلومات عامة عن هالموضوع؟";
                
                // البحث في قاعدة المعرفة
                for (let key in knowledgeBase) {
                    if (q.includes(key)) { answer = knowledgeBase[key]; break; }
                }

                addMessage(answer, 'ai');
            }, 600);
        }

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = type === 'user' ? 
                "bg-blue-600/30 p-5 rounded-3xl border border-blue-500/20 text-blue-100 mr-auto max-w-[80%] self-start text-right shadow-md" :
                "bg-yellow-500/10 p-5 rounded-3xl border border-yellow-500/20 text-yellow-100 ml-auto max-w-[85%] text-right font-medium shadow-md";
            msg.innerText = text;
            document.getElementById('chatContainer').appendChild(msg);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }

        function handleImage(input) {
            if(input.files && input.files[0]) {
                addMessage("🖼️ رفعت صورة: " + input.files[0].name, 'user');
                setTimeout(() => addMessage("وصلت الصورة يالبطل، قاعد أطالعها الحين.. شكلها محاضرة مهمة!", 'ai'), 600);
            }
        }

        // كود الميكروفون المحسن
        let recognition;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ar-SA';
            recognition.onresult = (e) => {
                let text = "";
                for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                document.getElementById('transcript').innerText = text;
                document.getElementById('transcript').classList.remove('opacity-50');
            };
        }

        document.getElementById('micBtn').onclick = function() {
            if (this.innerText.includes("بدء")) {
                recognition.start();
                this.innerText = "🔴 وقف يالحبيب";
                this.classList.replace('bg-yellow-500', 'bg-red-600');
                document.getElementById('status').innerText = "قاعد أسجل.. لا يطوفك شي!";
            } else {
                recognition.stop();
                this.innerText = "بدء التسجيل";
                this.classList.replace('bg-red-600', 'bg-yellow-500');
                document.getElementById('status').innerText = "تم الحفظ.. قواك الله";
            }
        };
    </script>
</body>
</html>
