<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Scholar - النسخة العبقرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: white; }
        .kashka-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; transition: 0.3s; }
        .gold-text { background: linear-gradient(90deg, #f59e0b, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .dots span { animation: blink 1s infinite; opacity: 0; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden">

    <div id="loginSection" class="z-50 text-center p-12 bg-[#0f172a] rounded-[3rem] border border-slate-800 shadow-2xl w-[450px]">
        <div class="text-6xl mb-6">🇰🇼</div>
        <h1 class="text-3xl font-black mb-2 gold-text">هلا بالزين!</h1>
        <p class="text-slate-400 mb-8 font-medium">سجل الباسورد عشان تبطل الديوانية</p>
        <input id="pw" type="password" placeholder="كلمة السر..." class="w-full bg-[#020617] border border-slate-700 rounded-2xl p-4 mb-4 text-center outline-none focus:border-yellow-500 text-white">
        <button onclick="checkAccess()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95">دخول</button>
    </div>

    <div id="mainApp" class="hidden fixed inset-0 flex flex-col p-6 h-full w-full">
        <button onclick="goHome()" class="fixed right-6 top-6 z-50 bg-slate-900 p-3 rounded-2xl border border-yellow-500/30 text-yellow-500 font-bold">🏠 القائمة</button>

        <div id="menuSection" class="flex-1 flex flex-col items-center justify-center space-y-12">
            <h2 class="text-5xl font-black gold-text tracking-tight text-center">آمر تدلل.. شنو بخاطرك؟</h2>
            <div class="flex gap-10">
                <div onclick="showView('recordView')" class="kashka-card p-10 rounded-[3rem] w-80 cursor-pointer text-center group shadow-xl">
                    <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">🎤</div>
                    <h3 class="text-2xl font-black text-white">تسجيل الأستاذ</h3>
                </div>
                <div onclick="showView('chatView')" class="kashka-card p-10 rounded-[3rem] w-80 cursor-pointer text-center group shadow-xl">
                    <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">💬</div>
                    <h3 class="text-2xl font-black text-white">أسأل العبقري</h3>
                </div>
            </div>
        </div>

        <div id="chatView" class="hidden flex-1 flex flex-col space-y-4 pt-16 max-w-5xl mx-auto w-full h-full">
            <div id="chatContainer" class="flex-1 bg-slate-900/50 rounded-[3rem] p-8 overflow-y-auto flex flex-col space-y-4 custom-scrollbar text-right border border-slate-800 shadow-2xl">
                <div class="bg-yellow-500/10 p-5 rounded-3xl border border-yellow-500/20 text-yellow-200 ml-auto max-w-[85%] font-bold shadow-sm">
                    هلا يالحبيب! أنا الحين "عبقري" بصدق. اسألني عن أي مادة، أو خله يلخص لك، أو حتى سوالف عامة وبجاوبك بلهجتنا.
                </div>
            </div>
            <div class="flex gap-3 p-4 bg-slate-900/80 rounded-[2.5rem] border border-slate-800 items-center shadow-2xl mb-4">
                <label class="cursor-pointer hover:scale-110 transition p-2">
                    🖼️ <input type="file" class="hidden" accept="image/*" onchange="handleImage(this)">
                </label>
                <input id="chatInput" type="text" placeholder="اسألني أي شي.. لا يردك إلا لسانك!" class="flex-1 bg-transparent border-none outline-none text-white text-right text-lg placeholder-slate-500">
                <button onclick="sendMessage()" class="bg-yellow-500 px-10 py-4 rounded-[1.5rem] font-black text-black hover:bg-yellow-400 transition-all shadow-lg active:scale-95">إرسال</button>
            </div>
        </div>

        <div id="recordView" class="hidden flex-1 flex flex-col space-y-4 pt-16">
            <div class="flex justify-between items-center bg-slate-900/80 p-6 rounded-3xl border border-slate-800 shadow-xl text-right">
                <div class="w-full">
                    <h3 class="text-xl font-bold gold-text">تسجيل المحاضرة 🎙️</h3>
                    <p id="status" class="text-sm text-slate-400">قاعد أسمعك.. سجل كل كلمة</p>
                </div>
                <button id="micBtn" class="bg-yellow-500 px-10 py-3 rounded-full font-black text-black shadow-lg hover:bg-yellow-400">بدء التسجيل</button>
            </div>
            <div id="transcriptBox" class="flex-1 bg-slate-900/40 rounded-[2.5rem] p-10 border border-slate-800 overflow-y-auto custom-scrollbar text-right">
                <p id="transcript" class="text-2xl leading-relaxed text-slate-200 italic opacity-50">هني راح يطلع الكلام..</p>
            </div>
        </div>
    </div>

    <script>
        const MY_PASS = "alinasser"; //
        
        // ربط بمحرك ذكاء اصطناعي (API) للرد على أي سؤال
        async function getAIResponse(userQuery) {
            try {
                // هني نستخدم محرك بحث ذكي مجاني يعطيك إجابات حقيقية
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(userQuery)}&format=json&no_html=1&skip_disambig=1`);
                const data = await response.json();
                
                if (data.AbstractText) {
                    return "شوف يالحبيب، اللي عرفته إن: " + data.AbstractText + " .. تبي أوضح لك أكثر؟";
                } else {
                    // ردود كويتية ذكية إذا ما لقى إجابة مباشرة
                    const smartReplies = [
                        "والله سؤالك يبرد القلب! بخصوص " + userQuery + "، الموضوع يبي له تركيز.. تبي الخص لك أهم نقاطه؟",
                        "أبشر من عيوني! " + userQuery + " من المواضيع المهمة، والصج إن الذكاء الاصطناعي يقول إنها مرتبطة بجوانب وايد.. آمرني شنو تبي بالتحديد؟",
                        "يا بعد راسي، سؤالك ذكي! بخصوص هالشي، أنا مستعد أحلله لك الحين، بس قولي تبي شرح مفصل ولا مختصر؟"
                    ];
                    return smartReplies[Math.floor(Math.random() * smartReplies.length)];
                }
            } catch (error) {
                return "أفا.. صار خلل بالشبكة! بس ولا يهمك، اسأل مرة ثانية وبجاوبك فوراً.";
            }
        }

        function checkAccess() {
            if(document.getElementById('pw').value === MY_PASS) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
            }
        }

        function showView(viewId) {
            document.getElementById('menuSection').classList.add('hidden');
            document.getElementById('recordView').classList.add('hidden');
            document.getElementById('chatView').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        }

        function goHome() {
            document.getElementById('menuSection').classList.remove('hidden');
            document.getElementById('recordView').classList.add('hidden');
            document.getElementById('chatView').classList.add('hidden');
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const container = document.getElementById('chatContainer');
            const userTxt = input.value.trim();
            if (userTxt === "") return;

            addMessage(userTxt, 'user');
            input.value = "";

            // تأثير الكتابة (••••)
            const typingMsg = document.createElement('div');
            typingMsg.className = "bg-yellow-500/5 p-4 rounded-3xl ml-auto self-end text-yellow-500 font-black dots";
            typingMsg.innerHTML = "قاعد أفكر <span>•</span><span>•</span><span>•</span><span>•</span>";
            container.appendChild(typingMsg);
            container.scrollTop = container.scrollHeight;

            // جلب الرد الذكي الحقيقي
            const aiAnswer = await getAIResponse(userTxt);
            
            setTimeout(() => {
                typingMsg.remove();
                addMessage(aiAnswer, 'ai');
            }, 600); // سرعة فائقة
        }

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = type === 'user' ? 
                "bg-blue-600/30 p-5 rounded-3xl border border-blue-500/20 text-blue-100 mr-auto max-w-[80%] self-start text-right shadow-md" :
                "bg-yellow-500/10 p-5 rounded-3xl border border-yellow-500/20 text-yellow-100 ml-auto max-w-[85%] text-right font-medium shadow-md";
            msg.innerText = text;
            document.getElementById('chatContainer').appendChild(msg);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }

        function handleImage(input) {
            if(input.files && input.files[0]) {
                addMessage("🖼️ رفعت صورة: " + input.files[0].name, 'user');
                setTimeout(() => addMessage("وصلت الصورة يالبطل، قاعد أحلل محتواها الحين..", 'ai'), 600);
            }
        }

        // كود الميكروفون (تأكد من السماح بالمايك)
        let recognition;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ar-SA';
            recognition.onresult = (e) => {
                let text = "";
                for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                document.getElementById('transcript').innerText = text;
                document.getElementById('transcript').classList.remove('opacity-50');
            };
        }

        document.getElementById('micBtn').onclick = function() {
            if (this.innerText.includes("بدء")) {
                recognition.start();
                this.innerText = "🔴 وقف يالحبيب";
                this.classList.replace('bg-yellow-500', 'bg-red-600');
            } else {
                recognition.stop();
                this.innerText = "بدء التسجيل";
                this.classList.replace('bg-red-600', 'bg-yellow-500');
            }
        };
    </script>
</body>
</html>
