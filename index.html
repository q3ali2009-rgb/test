<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر كوالا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8f9fa; overflow: hidden; }
        .sidebar { width: 280px; height: 100vh; position: fixed; right: 0; top: 0; background: white; border-left: 1px solid #eee; z-index: 40; }
        .main-area { margin-right: 280px; height: 100vh; overflow-y: auto; padding: 40px; }
        .product-card { background: white; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #efefef; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="passwordPage" class="fixed inset-0 z-[100] bg-white flex items-center justify-center">
        <div class="text-center animate__animated animate__fadeIn">
            <div class="text-6xl mb-4">🐨</div>
            <h1 class="text-2xl font-bold mb-6">يا هلا بيك.. منورنا يا الغالي</h1>
            <p class="mb-4 text-gray-500">ممكن تكتب الباسورد عشان تدخل؟</p>
            <input type="password" id="passInput" class="border-2 border-gray-200 rounded-xl px-6 py-3 outline-none focus:border-blue-400 text-center" placeholder="اكتب كلمة السر هني">
            <button onclick="unlockSite()" class="block w-full mt-4 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">دخول</button>
            <p id="failMsg" class="text-red-500 mt-4 hidden">أفا.. جرب مرة ثانية!</p>
        </div>
    </div>

    <div id="mainSite" class="hidden flex">
        
        <aside class="sidebar p-6 flex flex-col">
            <div class="text-2xl font-bold text-blue-600 mb-10 text-center">🐨 متجر كوالا</div>
            <nav class="space-y-4 flex-1">
                <a href="#" class="block p-4 rounded-xl bg-blue-50 text-blue-700 font-bold">القائمة الرئيسية</a>
                <a href="#" class="block p-4 rounded-xl hover:bg-gray-50 transition">حول المنتج</a>
                <a href="#" class="block p-4 rounded-xl hover:bg-gray-50 transition">سياسة الاسترجاع</a>
                <a href="#" class="block p-4 rounded-xl hover:bg-gray-50 transition">تواصل معنا</a>
            </nav>
            <div class="p-4 bg-gray-50 rounded-xl text-center cursor-pointer" onclick="openCart()">
                🛒 السلة (<span id="countTop">0</span>)
            </div>
        </aside>

        <main class="main-area">
            <header class="mb-10 flex justify-between items-center">
                <h2 class="text-3xl font-bold">منتجاتنا الحصرية</h2>
                <div class="text-gray-400">44 منتج متاح</div>
            </header>

            <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </main>
    </div>

    <div id="cartModal" class="fixed inset-0 z-[60] bg-black/50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 animate__animated animate__fadeInUp">
            <h2 class="text-2xl font-bold mb-6">سلة المشتريات</h2>
            <div id="cartItems" class="space-y-4 mb-6 max-h-60 overflow-y-auto border-b pb-4">
                </div>
            <div class="flex justify-between font-bold text-xl mb-6">
                <span>الإجمالي:</span>
                <span id="totalPrice">0</span><span> د.ك</span>
            </div>
            
            <div class="mb-6">
                <p class="text-sm text-gray-400 mb-2">اختر طريقة الدفع:</p>
                <div class="grid grid-cols-3 gap-2">
                    <div class="border p-2 rounded-lg text-center font-bold text-blue-600 bg-blue-50 text-xs">K-NET</div>
                    <div class="border p-2 rounded-lg text-center text-xs opacity-50">VISA</div>
                    <div class="border p-2 rounded-lg text-center text-xs opacity-50">MasterCard</div>
                </div>
            </div>

            <button onclick="payNow()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg">توجه إلى بوابة الدفع</button>
            <button onclick="closeCart()" class="w-full mt-2 text-gray-400">إغلاق</button>
        </div>
    </div>

    <script>
        let cart = [];
        const professions = ["طيار", "مهندس", "دكتور", "شيف", "لاعب", "فنان", "بحار", "شرطي", "رائد فضاء", "مدرس", "ميكانيكي", "رسام", "قاضي", "كاتب"];

        // وظيفة الدخول بالباسورد
        function unlockSite() {
            const input = document.getElementById('passInput').value;
            if(input === 'alinasser') {
                document.getElementById('passwordPage').style.display = 'none';
                document.getElementById('mainSite').classList.remove('hidden');
                generateProducts();
            } else {
                document.getElementById('failMsg').classList.remove('hidden');
            }
        }

        // توليد 44 منتج بالضبط
        function generateProducts() {
            const grid = document.getElementById('productsGrid');
            for(let i=1; i<=44; i++) {
                const job = professions[i % professions.length];
                grid.innerHTML += `
                    <div class="product-card animate__animated animate__fadeInUp">
                        <div class="text-5xl mb-4 py-8 bg-gray-50 rounded-2xl">🐨</div>
                        <h3 class="font-bold text-lg">كوالا ${job}</h3>
                        <p class="text-blue-600 font-bold my-2 text-xl">15.000 د.ك</p>
                        <button onclick="addToCart('كوالا ${job}', 15)" class="w-full bg-gray-900 text-white py-3 rounded-xl hover:bg-blue-600 transition">إضافة إلى السلة</button>
                    </div>`;
            }
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('countTop').innerText = cart.length;
            alert("تمت الإضافة بنجاح");
        }

        function openCart() {
            const modal = document.getElementById('cartModal');
            const itemsDiv = document.getElementById('cartItems');
            const totalDiv = document.getElementById('totalPrice');
            
            modal.style.display = 'flex';
            
            if(cart.length === 0) {
                itemsDiv.innerHTML = "<p class='text-center text-gray-400'>السلة فارغة</p>";
                totalDiv.innerText = "0";
                return;
            }

            itemsDiv.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                    <span>${item.name}</span>
                    <span class="font-bold">${item.price} د.ك</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalDiv.innerText = total;
        }

        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        function payNow() {
            if(cart.length === 0) return alert("السلة فارغة!");
            alert("سيتم توجيهك الآن إلى بوابة دفع K-NET الآمنة.. شكراً لك!");
            location.reload(); 
        }
    </script>
</body>
</html>
