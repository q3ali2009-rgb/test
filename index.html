<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Scholar - النسخة الكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .kashka-glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes typing { from { opacity: 0.3; } to { opacity: 1; } }
        .typing-dots span { animation: typing 0.8s infinite alternate; font-size: 20px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden">

    <div id="loginSection" class="z-50 text-center p-10 kashka-glass rounded-[2rem] shadow-2xl w-[450px]">
        <div class="text-6xl mb-6">🇰🇼</div>
        <h1 class="text-3xl font-black mb-2 gradient-text">هلا بالزين!</h1>
        <p class="text-slate-400 mb-8 font-medium">سجل الباسورد عشان تبطل الديوانية</p>
        <input id="pw" type="password" placeholder="كلمة السر يالحبيب..." class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 mb-4 text-center outline-none focus:ring-2 focus:ring-blue-500 text-white">
        <button onclick="checkAccess()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-lg transition-transform active:scale-95">دخول</button>
        <p id="err" class="text-red-400 mt-4 text-sm hidden">يالحبيب الباسورد غلط، ركز!</p>
    </div>

    <div id="mainApp" class="hidden fixed inset-0 flex flex-col p-6 h-full w-full">
        <button onclick="goHome()" class="fixed right-6 top-6 z-50 bg-slate-800 p-3 rounded-2xl border border-slate-700 text-white">🏠 القائمة</button>

        <div id="menuSection" class="flex-1 flex flex-col items-center justify-center space-y-8">
            <h2 class="text-4xl font-black gradient-text">آمر تدلل.. شنو تبي تسوي؟</h2>
            <div class="flex gap-8">
                <div onclick="showView('recordView')" class="kashka-glass p-8 rounded-[2.5rem] w-72 cursor-pointer hover:scale-105 transition-all text-center">
                    <div class="text-5xl mb-4">🎤</div>
                    <h3 class="text-xl font-bold">تسجيل الأستاذ</h3>
                </div>
                <div onclick="showView('chatView')" class="kashka-glass p-8 rounded-[2.5rem] w-72 cursor-pointer hover:scale-105 transition-all text-center">
                    <div class="text-5xl mb-4">💬</div>
                    <h3 class="text-xl font-bold">أسأل AI</h3>
                </div>
            </div>
        </div>

        <div id="recordView" class="hidden flex-1 flex flex-col space-y-4 pt-16">
            <div class="flex justify-between items-center bg-slate-800/50 p-6 rounded-3xl border border-slate-700">
                <div class="text-right">
                    <h3 class="text-xl font-bold">تسجيل كلام الأستاذ 🎙️</h3>
                    <p id="status" class="text-sm text-slate-400">قواك الله.. اضغط الزر وبلش</p>
                </div>
                <button id="micBtn" class="bg-blue-600 px-8 py-3 rounded-full font-bold text-white">بدء التسجيل</button>
            </div>
            <div class="flex-1 bg-slate-900/50 rounded-[2rem] p-8 border border-slate-800 overflow-y-auto custom-scrollbar text-right">
                <p id="transcript" class="text-2xl leading-relaxed text-slate-300 italic opacity-50">هني راح يطلع الكلام.. ناطرينك..</p>
            </div>
        </div>

        <div id="chatView" class="hidden flex-1 flex flex-col space-y-4 pt-16 max-w-4xl mx-auto w-full">
            <div id="chatContainer" class="flex-1 kashka-glass rounded-[2rem] p-6 overflow-y-auto flex flex-col space-y-4 custom-scrollbar text-right">
                <div class="bg-purple-600/20 p-4 rounded-2xl border border-purple-500/30 text-purple-200 ml-auto max-w-[80%]">
                    هلا بك! شنو اللي مو فاهمه بالمحاضرة؟ أو تبي ترفق صورة؟ أنا حاضر.
                </div>
            </div>
            <div class="flex gap-2 p-2 items-center">
                <label class="cursor-pointer bg-slate-800 p-4 rounded-2xl hover:bg-slate-700 transition" title="ارفق صورة">
                    📷 <input type="file" class="hidden" accept="image/*" onchange="handleImage(this)">
                </label>
                <input id="chatInput" type="text" placeholder="اكتب سؤالك هني يا بطل..." class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl p-4 outline-none focus:border-purple-500 text-white text-right">
                <button onclick="sendMessage()" class="bg-purple-600 px-8 py-4 rounded-2xl font-bold text-white">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        const MY_PASS = "alinasser"; // الباسورد اللي تبيه

        function checkAccess() {
            if(document.getElementById('pw').value === MY_PASS) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }

        function showView(viewId) {
            document.getElementById('menuSection').classList.add('hidden');
            document.getElementById('recordView').classList.add('hidden');
            document.getElementById('chatView').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        }

        function goHome() {
            document.getElementById('menuSection').classList.remove('hidden');
            document.getElementById('recordView').classList.add('hidden');
            document.getElementById('chatView').classList.add('hidden');
        }

        // إرسال الشات ودعم Enter
        document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const container = document.getElementById('chatContainer');
            if (input.value.trim() === "") return;

            // رسالة المستخدم
            addMessage(input.value, 'user');
            const userTxt = input.value;
            input.value = "";

            // تأثير الكتابة (••••)
            const typingMsg = document.createElement('div');
            typingMsg.className = "bg-purple-600/10 p-4 rounded-2xl ml-auto self-end text-purple-300 typing-dots";
            typingMsg.innerHTML = "قاعد أفكر <span>•</span><span>•</span><span>•</span><span>•</span>";
            container.appendChild(typingMsg);
            container.scrollTop = container.scrollHeight;

            // رد الـ AI الوهمي (كمثال)
            setTimeout(() => {
                typingMsg.remove();
                addMessage("أبشر يالحبيب، بخصوص (" + userTxt + ")، هذا تحليل ذكي وسريع لك.. نخدمك بعيونا!", 'ai');
            }, 1500);
        }

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = type === 'user' ? 
                "bg-blue-600/40 p-4 rounded-2xl border border-blue-500/30 text-blue-100 mr-auto max-w-[80%] self-start text-right" :
                "bg-purple-600/20 p-4 rounded-2xl border border-purple-500/30 text-purple-200 ml-auto max-w-[80%] text-right";
            msg.innerText = text;
            document.getElementById('chatContainer').appendChild(msg);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }

        function handleImage(input) {
            if(input.files && input.files[0]) {
                addMessage("📷 تم إرفاق صورة: " + input.files[0].name, 'user');
                setTimeout(() => addMessage("وصلت الصورة يالبطل، قاعد أحللها لك الحين..", 'ai'), 1000);
            }
        }

        // تسجيل الصوت المستقر
        let rec;
        if ('webkitSpeechRecognition' in window) {
            rec = new webkitSpeechRecognition();
            rec.continuous = true; rec.interimResults = true; rec.lang = 'ar-SA';
            rec.onresult = (e) => {
                let text = "";
                for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                document.getElementById('transcript').innerText = text;
                document.getElementById('transcript').classList.remove('opacity-50');
            };
        }

        document.getElementById('micBtn').onclick = function() {
            if (this.innerText.includes("بدء")) {
                rec.start();
                this.innerText = "🔴 وقف التسجيل";
                this.classList.replace('bg-blue-600', 'bg-red-600');
                document.getElementById('status').innerText = "جاري الاستماع.. سجل يا تاريخ!";
            } else {
                rec.stop();
                this.innerText = "بدء التسجيل";
                this.classList.replace('bg-red-600', 'bg-blue-600');
                document.getElementById('status').innerText = "تم الحفظ.. قواك الله";
            }
        };
    </script>
</body>
</html>
